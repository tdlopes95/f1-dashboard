<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 REPLAY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    /* ── Replay-specific overrides ─────────────────────── */
    body { overflow-y: auto; }

    #replay-header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    .rh-f1 {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 22px;
      color: var(--accent-red);
      letter-spacing: -1px;
    }

    .rh-divider {
      width: 1px;
      height: 20px;
      background: var(--border-bright);
    }

    .rh-badge {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--accent-red);
      border: 1px solid var(--accent-red);
      padding: 3px 8px;
      border-radius: 2px;
    }

    #rh-session-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.5px;
      color: var(--text-primary);
      flex: 1;
    }

    #rh-session-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-secondary);
    }

    .rh-back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--border-bright);
      color: var(--accent-red);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 2px;
      padding: 6px 14px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }
    .rh-back-btn:hover {
      background: rgba(232,0,45,0.1);
      border-color: var(--accent-red);
    }

    /* ── Main replay layout ────────────────────────────── */
    #replay-main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Loading / error states ────────────────────────── */
    #replay-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
    }

    .rl-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border-bright);
      border-top-color: var(--accent-red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .rl-text {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--text-secondary);
    }

    /* ── Section card ──────────────────────────────────── */
    .rp-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .rp-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--bg-panel-2);
      border-bottom: 1px solid var(--border);
    }

    .rp-card-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--accent-red);
      flex: 1;
    }

    .rp-card-sub {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
    }

    /* ── Top row: 2-col ───────────────────────────────── */
    .rp-top-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* ── Classification table ─────────────────────────── */
    .cls-table {
      width: 100%;
      border-collapse: collapse;
    }

    .cls-table th {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-secondary);
      padding: 6px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel-2);
    }

    .cls-table td {
      padding: 5px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-data);
    }

    .cls-table tr:hover td { background: var(--bg-row-hover); }

    .cls-pos {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 15px;
      color: var(--text-secondary);
      width: 32px;
      text-align: center;
    }
    .cls-pos.p1 { color: var(--accent-yellow); }
    .cls-pos.p2 { color: #c0c0c0; }
    .cls-pos.p3 { color: #cd7f32; }

    .cls-driver {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .cls-color-bar {
      width: 3px;
      height: 16px;
      border-radius: 1px;
      flex-shrink: 0;
    }
    .cls-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      color: var(--text-primary);
    }
    .cls-team {
      font-size: 9px;
      color: var(--text-secondary);
      display: block;
    }
    .cls-status {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 1px;
    }
    .cls-status--finished { color: var(--text-secondary); }
    .cls-status--dnf { color: var(--accent-red); }
    .cls-status--dns { color: var(--text-dim); }

    .cls-fastest {
      color: var(--accent-purple) !important;
    }
    .cls-fastest-badge {
      font-family: var(--font-display);
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--accent-purple);
      border: 1px solid rgba(138,43,226,0.4);
      padding: 1px 4px;
      border-radius: 2px;
      margin-left: 4px;
    }

    .cls-points {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      color: var(--text-primary);
      text-align: right;
    }

    /* ── Pit stop table ───────────────────────────────── */
    .pit-table {
      width: 100%;
      border-collapse: collapse;
    }
    .pit-table th {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-secondary);
      padding: 6px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel-2);
    }
    .pit-table td {
      padding: 5px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-data);
    }
    .pit-table tr:hover td { background: var(--bg-row-hover); }
    .pit-stop-time {
      font-weight: 700;
      color: var(--text-primary);
    }
    .pit-stop-time.fast { color: var(--accent-green); }

    /* ── Fastest laps ──────────────────────────────────── */
    .fl-table {
      width: 100%;
      border-collapse: collapse;
    }
    .fl-table th {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-secondary);
      padding: 6px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel-2);
    }
    .fl-table td {
      padding: 5px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-data);
    }
    .fl-table tr:hover td { background: var(--bg-row-hover); }
    .fl-rank-1 td { background: rgba(138,43,226,0.06); }

    /* ── Lap chart section ─────────────────────────────── */
    #lap-chart-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .lc-label {
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-secondary);
    }

    .driver-chip {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 2px;
      border: 1px solid var(--border-bright);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .driver-chip:hover { border-color: var(--text-primary); color: var(--text-primary); }
    .driver-chip.active {
      color: var(--bg-base);
      border-color: transparent;
    }

    #lap-chart-canvas-wrap {
      padding: 12px 16px 8px;
      position: relative;
    }

    #lap-chart-canvas {
      width: 100%;
      display: block;
      cursor: crosshair;
    }

    #lap-chart-tooltip {
      position: absolute;
      pointer-events: none;
      background: #1a1a1a;
      border: 1px solid var(--border-bright);
      border-radius: 2px;
      padding: 5px 10px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-primary);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 10;
    }

    /* ── Stint strategy ────────────────────────────────── */
    #strategy-wrap {
      padding: 12px 16px;
      overflow-x: auto;
    }

    .strat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      min-width: 0;
    }

    .strat-driver-label {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 11px;
      width: 40px;
      flex-shrink: 0;
      color: var(--text-primary);
      text-align: right;
    }

    .strat-bar-wrap {
      flex: 1;
      display: flex;
      height: 18px;
      border-radius: 2px;
      overflow: hidden;
      min-width: 0;
    }

    .strat-stint {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 9px;
      letter-spacing: 1px;
      border-right: 1px solid rgba(0,0,0,0.3);
      transition: opacity 0.15s;
      cursor: default;
      overflow: hidden;
      white-space: nowrap;
    }
    .strat-stint:last-child { border-right: none; }
    .strat-stint:hover { opacity: 0.8; }

    .strat-stint.soft   { background: var(--tyre-soft);   color: #000; }
    .strat-stint.medium { background: var(--tyre-medium); color: #000; }
    .strat-stint.hard   { background: var(--tyre-hard);   color: #000; }
    .strat-stint.inter  { background: var(--tyre-inter);  color: #000; }
    .strat-stint.wet    { background: var(--tyre-wet);    color: #fff; }
    .strat-stint.unknown { background: #444; color: #ccc; }

    .strat-laps-label {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      flex-shrink: 0;
      width: 48px;
      text-align: right;
    }

    /* ── No data ───────────────────────────────────────── */
    .rp-no-data {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────── -->
  <header id="replay-header">
    <span class="rh-f1">F1</span>
    <div class="rh-divider"></div>
    <span class="rh-badge">REPLAY</span>
    <span id="rh-session-name">Loading...</span>
    <span id="rh-session-meta"></span>
    <a href="index.html" class="rh-back-btn">↩ BACK TO LIVE</a>
  </header>

  <!-- ── Loading state ──────────────────────────────── -->
  <div id="replay-loading">
    <div class="rl-spinner"></div>
    <div class="rl-text">LOADING SESSION DATA</div>
  </div>

  <!-- ── Main content (hidden until loaded) ─────────── -->
  <main id="replay-main" style="display:none">

    <!-- Row 1: Classification + Pit Stops -->
    <div class="rp-top-row">

      <!-- Classification -->
      <div class="rp-card" id="card-classification">
        <div class="rp-card-header">
          <span class="rp-card-title">RACE CLASSIFICATION</span>
          <span class="rp-card-sub" id="cls-sub"></span>
        </div>
        <div id="classification-body"></div>
      </div>

      <!-- Pit Stops -->
      <div class="rp-card" id="card-pits">
        <div class="rp-card-header">
          <span class="rp-card-title">PIT STOPS</span>
          <span class="rp-card-sub" id="pits-sub"></span>
        </div>
        <div id="pits-body"></div>
      </div>

    </div>

    <!-- Row 2: Fastest Laps -->
    <div class="rp-card" id="card-fastest">
      <div class="rp-card-header">
        <span class="rp-card-title">FASTEST LAPS</span>
        <span class="rp-card-sub" id="fl-sub"></span>
      </div>
      <div id="fastest-body"></div>
    </div>

    <!-- Row 3: Stint Strategy -->
    <div class="rp-card" id="card-strategy">
      <div class="rp-card-header">
        <span class="rp-card-title">TYRE STRATEGY</span>
        <span class="rp-card-sub">stint duration by compound</span>
      </div>
      <div id="strategy-wrap">
        <div class="rp-no-data" id="strategy-no-data">Strategy data available for 2023+ seasons</div>
      </div>
    </div>

    <!-- Row 4: Lap Time Chart -->
    <div class="rp-card" id="card-lapchart">
      <div class="rp-card-header">
        <span class="rp-card-title">LAP TIME CHART</span>
        <span class="rp-card-sub" id="lc-best-label"></span>
      </div>
      <div id="lap-chart-controls">
        <span class="lc-label">DRIVER</span>
        <div id="driver-chips"></div>
      </div>
      <div id="lap-chart-canvas-wrap">
        <canvas id="lap-chart-canvas" height="200"></canvas>
        <div id="lap-chart-tooltip"></div>
      </div>
    </div>

  </main>

  <script>
  // ═══════════════════════════════════════════════════════
  // replay.js — Historical session data viewer
  // Fetches from Jolpica ergast API, renders 5 sections
  // ═══════════════════════════════════════════════════════

  const JOLPICA = 'https://api.jolpi.ca/ergast/f1';

  // ── URL params ───────────────────────────────────────
  const params      = new URLSearchParams(location.search);
  const SEASON      = params.get('season');
  const ROUND       = params.get('round');   // ergast round number OR openf1 meeting_key
  const GP_NAME     = params.get('name') || 'Grand Prix';
  const SESSION_LBL = params.get('session') || 'Race';
  const SOURCE      = params.get('source') || 'jolpika'; // jolpika | openf1
  const SESSION_KEY = params.get('session_key'); // openf1 session_key if source=openf1

  if (!SEASON || !ROUND) {
    document.getElementById('replay-loading').innerHTML =
      '<div class="rl-text" style="text-align:center">No session specified.<br><a href="index.html" style="color:var(--accent-red);margin-top:8px;display:inline-block">← Return to live</a></div>';
  }

  // ── Jolpica fetch ────────────────────────────────────
  async function jFetch(path) {
    try {
      const r = await fetch(`${JOLPICA}${path}.json?limit=100`);
      if (!r.ok) throw new Error(r.status);
      const j = await r.json();
      return j?.MRData || null;
    } catch(e) {
      console.warn('[Jolpica]', path, e.message);
      return null;
    }
  }

  // ── Format helpers ───────────────────────────────────
  function fmtTime(t) {
    if (!t) return '–';
    // t may be "1:23.456" or "83.456"
    if (typeof t === 'string' && t.includes(':')) return t;
    const secs = parseFloat(t);
    if (isNaN(secs)) return t;
    const m = Math.floor(secs / 60);
    const s = (secs % 60).toFixed(3).padStart(6,'0');
    return m > 0 ? `${m}:${s}` : s;
  }

  function fmtDuration(t) {
    if (!t) return '–';
    // pit stop duration in seconds e.g. "23.456"
    return parseFloat(t).toFixed(3) + 's';
  }

  function tyreCompoundClass(c) {
    if (!c) return 'unknown';
    const u = c.toUpperCase();
    if (u === 'SOFT')   return 'soft';
    if (u === 'MEDIUM') return 'medium';
    if (u === 'HARD')   return 'hard';
    if (u.includes('INTER')) return 'inter';
    if (u.includes('WET'))   return 'wet';
    return 'unknown';
  }

  // Team colour lookup (fallback palette)
  const TEAM_COLORS = {
    'Red Bull': '#3671C6', 'Ferrari': '#E8002D', 'Mercedes': '#27F4D2',
    'McLaren': '#FF8000', 'Aston Martin': '#229971', 'Alpine': '#FF87BC',
    'Williams': '#64C4FF', 'RB': '#6692FF', 'AlphaTauri': '#5E8FAA',
    'Kick Sauber': '#52E252', 'Alfa Romeo': '#C92D4B', 'Haas': '#B6BABD',
    'Racing Point': '#F596C8', 'Renault': '#FFF500', 'Toro Rosso': '#469BFF',
  };
  function teamColor(name) {
    const key = Object.keys(TEAM_COLORS).find(k => name?.includes(k));
    return key ? TEAM_COLORS[key] : '#888';
  }

  // ── Render: Classification ───────────────────────────
  function renderClassification(results, laps) {
    const body = document.getElementById('classification-body');
    const sub  = document.getElementById('cls-sub');

    if (!results?.length) {
      body.innerHTML = '<div class="rp-no-data">No classification data</div>';
      return;
    }

    // Find fastest lap holder
    const flHolder = results.find(r => r.FastestLap?.rank === '1');

    sub.textContent = `${results.length} classified · ${laps} laps`;

    const table = document.createElement('table');
    table.className = 'cls-table';
    table.innerHTML = `
      <thead>
        <tr>
          <th>POS</th><th>DRIVER</th><th>CONSTRUCTOR</th>
          <th>TIME / GAP</th><th>PTS</th>
        </tr>
      </thead>
    `;
    const tbody = document.createElement('tbody');

    results.forEach(r => {
      const pos = parseInt(r.position);
      const posClass = pos === 1 ? 'p1' : pos === 2 ? 'p2' : pos === 3 ? 'p3' : '';
      const color = teamColor(r.Constructor?.name);
      const isFastest = r.FastestLap?.rank === '1';
      const isFinished = r.status === 'Finished' || r.status?.startsWith('+');
      const isDNF = !isFinished && r.status !== 'Finished';

      let timeStr = '–';
      if (pos === 1) timeStr = r.Time?.time || r.status || '–';
      else if (isFinished) timeStr = r.Time?.time || r.status || '–';
      else timeStr = r.status || '–';

      const statusClass = isDNF ? 'cls-status--dnf' : 'cls-status--finished';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="cls-pos ${posClass}">${pos}</td>
        <td>
          <div class="cls-driver">
            <div class="cls-color-bar" style="background:${color}"></div>
            <div>
              <span class="cls-name">${r.Driver?.code || r.Driver?.familyName || '?'}</span>
              ${isFastest ? '<span class="cls-fastest-badge">⚡ FL</span>' : ''}
              <span class="cls-team">${r.Driver?.givenName} ${r.Driver?.familyName}</span>
            </div>
          </div>
        </td>
        <td style="font-family:var(--font-display);font-size:11px;color:var(--text-secondary)">${r.Constructor?.name || '–'}</td>
        <td class="${isFastest ? 'cls-fastest' : ''} ${statusClass}" style="font-family:var(--font-mono);font-size:11px">${timeStr}</td>
        <td class="cls-points">${r.points || '0'}</td>
      `;
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    body.appendChild(table);
  }

  // ── Render: Pit Stops ────────────────────────────────
  function renderPitStops(pits) {
    const body = document.getElementById('pits-body');
    const sub  = document.getElementById('pits-sub');

    if (!pits?.length) {
      body.innerHTML = '<div class="rp-no-data">Pit stop data unavailable for this season</div>';
      return;
    }

    sub.textContent = `${pits.length} stops`;

    // Find fastest stop
    const durations = pits.map(p => parseFloat(p.duration)).filter(d => !isNaN(d));
    const minDur    = Math.min(...durations);

    const table = document.createElement('table');
    table.className = 'pit-table';
    table.innerHTML = `
      <thead>
        <tr><th>DRIVER</th><th>LAP</th><th>STOP</th><th>DURATION</th></tr>
      </thead>
    `;
    const tbody = document.createElement('tbody');

    // Sort by lap, then stop number
    const sorted = [...pits].sort((a, b) =>
      parseInt(a.lap) - parseInt(b.lap) || parseInt(a.stop) - parseInt(b.stop)
    );

    sorted.forEach(p => {
      const dur = parseFloat(p.duration);
      const isFastest = dur === minDur;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--text-primary)">${p.driverCode || p.driverId?.toUpperCase().slice(0,3) || '?'}</td>
        <td>L${p.lap}</td>
        <td>#${p.stop}</td>
        <td class="pit-stop-time ${isFastest ? 'fast' : ''}">${fmtDuration(p.duration)}${isFastest ? ' ⚡' : ''}</td>
      `;
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    body.appendChild(table);
  }

  // ── Render: Fastest Laps ─────────────────────────────
  function renderFastestLaps(results) {
    const body = document.getElementById('fastest-body');
    const sub  = document.getElementById('fl-sub');

    const withFL = results
      .filter(r => r.FastestLap?.Time?.time)
      .sort((a, b) => {
        const ta = timeToSec(a.FastestLap.Time.time);
        const tb = timeToSec(b.FastestLap.Time.time);
        return ta - tb;
      });

    if (!withFL.length) {
      body.innerHTML = '<div class="rp-no-data">Fastest lap data unavailable</div>';
      return;
    }

    sub.textContent = `top ${Math.min(withFL.length, 10)} drivers`;

    function timeToSec(t) {
      const parts = t.split(':');
      return parts.length === 2
        ? parseInt(parts[0]) * 60 + parseFloat(parts[1])
        : parseFloat(t);
    }

    const best = timeToSec(withFL[0].FastestLap.Time.time);

    const table = document.createElement('table');
    table.className = 'fl-table';
    table.innerHTML = `
      <thead>
        <tr><th>#</th><th>DRIVER</th><th>CONSTRUCTOR</th><th>LAP</th><th>TIME</th><th>GAP</th><th>AVG SPEED</th></tr>
      </thead>
    `;
    const tbody = document.createElement('tbody');

    withFL.slice(0, 10).forEach((r, i) => {
      const color  = teamColor(r.Constructor?.name);
      const sec    = timeToSec(r.FastestLap.Time.time);
      const gap    = i === 0 ? '–' : `+${(sec - best).toFixed(3)}`;
      const speed  = r.FastestLap?.AverageSpeed?.speed
        ? `${parseFloat(r.FastestLap.AverageSpeed.speed).toFixed(1)} km/h` : '–';

      const tr = document.createElement('tr');
      if (i === 0) tr.className = 'fl-rank-1';
      tr.innerHTML = `
        <td style="font-family:var(--font-display);font-weight:800;font-size:14px;color:${i===0?'var(--accent-purple)':'var(--text-secondary)'};">${i+1}</td>
        <td>
          <div class="cls-driver">
            <div class="cls-color-bar" style="background:${color}"></div>
            <span class="cls-name">${r.Driver?.code || r.Driver?.familyName}</span>
          </div>
        </td>
        <td style="font-family:var(--font-display);font-size:11px;color:var(--text-secondary)">${r.Constructor?.name || '–'}</td>
        <td>L${r.FastestLap?.lap || '–'}</td>
        <td style="color:${i===0?'var(--accent-purple)':'var(--text-primary)'};font-weight:700">${r.FastestLap.Time.time}</td>
        <td style="color:var(--text-secondary)">${gap}</td>
        <td>${speed}</td>
      `;
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    body.appendChild(table);
  }

  // ── Render: Stint Strategy ───────────────────────────
  function renderStrategy(results, stints) {
    const wrap   = document.getElementById('strategy-wrap');
    const noData = document.getElementById('strategy-no-data');

    if (!stints?.length) {
      noData.style.display = 'block';
      return;
    }
    noData.style.display = 'none';

    // Group stints by driver
    const byDriver = {};
    stints.forEach(s => {
      const id = s.driverId;
      if (!byDriver[id]) byDriver[id] = [];
      byDriver[id].push(s);
    });

    // Total laps from results
    const totalLaps = Math.max(...results.map(r => parseInt(r.laps) || 0)) || 60;

    // Sort drivers by final position
    const driverOrder = results
      .sort((a, b) => parseInt(a.position) - parseInt(b.position))
      .map(r => r.Driver?.driverId);

    driverOrder.forEach(driverId => {
      const driverStints = byDriver[driverId];
      if (!driverStints?.length) return;

      const result = results.find(r => r.Driver?.driverId === driverId);
      const code   = result?.Driver?.code || driverId?.slice(0,3).toUpperCase() || '?';
      const color  = teamColor(result?.Constructor?.name);

      driverStints.sort((a, b) => parseInt(a.lap) - parseInt(b.lap));

      const row = document.createElement('div');
      row.className = 'strat-row';

      const label = document.createElement('div');
      label.className = 'strat-driver-label';
      label.style.color = color;
      label.textContent = code;

      const barWrap = document.createElement('div');
      barWrap.className = 'strat-bar-wrap';

      driverStints.forEach((stint, i) => {
        const lapStart = parseInt(stint.lap) || 1;
        const lapEnd   = i < driverStints.length - 1
          ? parseInt(driverStints[i+1].lap) - 1
          : totalLaps;
        const laps = lapEnd - lapStart + 1;
        const pct  = (laps / totalLaps) * 100;

        const compound = stint.compound || stint.Compound || '';
        // Cycle through stint colors since Jolpica has no tyre compound data
        const stintColors = ['#e8002d','#ffe600','#f0f0f0','#39c935','#0068ff','#ff8000'];
        const stintColor  = compound ? null : stintColors[i % stintColors.length];
        const compClass   = compound ? tyreCompoundClass(compound) : '';
        const letter      = compound ? compound[0].toUpperCase() : `S${i+1}`;

        const seg = document.createElement('div');
        seg.className = `strat-stint ${compClass}`;
        if (stintColor) {
          seg.style.background = stintColor;
          seg.style.color = i === 1 ? '#000' : (i === 2 ? '#000' : '#fff');
        }
        seg.style.width = `${pct}%`;
        seg.title = `Stint ${i+1} · L${lapStart}–${lapEnd} (${laps} laps)`;
        if (pct > 6) seg.textContent = letter;
        barWrap.appendChild(seg);
      });

      const lapsLabel = document.createElement('div');
      lapsLabel.className = 'strat-laps-label';
      lapsLabel.textContent = `${result?.laps || '?'}L`;

      row.appendChild(label);
      row.appendChild(barWrap);
      row.appendChild(lapsLabel);
      wrap.appendChild(row);
    });
  }

  // ── Render: Lap Chart ────────────────────────────────
  let _lapData   = {};   // driverId → [{lap, time}]
  let _lapColors = {};   // driverId → hex color
  let _activeDrv = null;

  function renderLapChart(results, lapTimes) {
    const canvas   = document.getElementById('lap-chart-canvas');
    const chips    = document.getElementById('driver-chips');
    const tooltip  = document.getElementById('lap-chart-tooltip');
    const bestLbl  = document.getElementById('lc-best-label');

    if (!lapTimes?.length) {
      chips.innerHTML = '<span class="rp-no-data" style="padding:4px 0">Lap time data unavailable for this season</span>';
      canvas.style.display = 'none';
      return;
    }

    // Group by driver
    lapTimes.forEach(lt => {
      const id = lt.driverId;
      if (!_lapData[id]) _lapData[id] = [];
      _lapData[id].push({ lap: parseInt(lt.lap), time: lt.time });
    });

    // Sort each driver's laps
    Object.keys(_lapData).forEach(id => {
      _lapData[id].sort((a, b) => a.lap - b.lap);
    });

    // Assign colors from results
    results.forEach(r => {
      _lapColors[r.Driver?.driverId] = teamColor(r.Constructor?.name);
    });

    // Build driver chips sorted by finishing position
    const sortedDrivers = results
      .sort((a, b) => parseInt(a.position) - parseInt(b.position))
      .map(r => r.Driver?.driverId)
      .filter(id => _lapData[id]);

    chips.innerHTML = '';
    sortedDrivers.forEach(id => {
      const result = results.find(r => r.Driver?.driverId === id);
      const code   = result?.Driver?.code || id?.slice(0,3).toUpperCase();
      const color  = _lapColors[id];

      const chip = document.createElement('button');
      chip.className = 'driver-chip';
      chip.textContent = code;
      chip.dataset.driverId = id;
      chip.addEventListener('click', () => {
        document.querySelectorAll('.driver-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        chip.style.background = color;
        _activeDrv = id;
        drawChart(id);
      });
      chips.appendChild(chip);
    });

    // Select first driver by default
    if (sortedDrivers.length) {
      const first = sortedDrivers[0];
      const firstChip = chips.querySelector(`[data-driver-id="${first}"]`);
      if (firstChip) {
        firstChip.classList.add('active');
        firstChip.style.background = _lapColors[first];
        _activeDrv = first;
        drawChart(first);
      }
    }

    // Tooltip on mousemove
    canvas.addEventListener('mousemove', e => {
      if (!_activeDrv) return;
      const rect   = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const mx     = (e.clientX - rect.left) * scaleX;

      const laps = _lapData[_activeDrv];
      if (!laps?.length) return;

      const PAD = { left: 48, right: 16, top: 10, bottom: 24 };
      const plotW = canvas.width - PAD.left - PAD.right;
      const idx   = Math.round(((mx - PAD.left) / plotW) * (laps.length - 1));
      const lap   = laps[Math.max(0, Math.min(laps.length - 1, idx))];
      if (!lap) return;

      tooltip.style.opacity = '1';
      tooltip.innerHTML = `L${lap.lap} &nbsp; <strong>${lap.time || '–'}</strong>`;
      const tipX = e.clientX - rect.left;
      tooltip.style.left = `${tipX > rect.width / 2 ? tipX - 120 : tipX + 12}px`;
      tooltip.style.top  = `${e.clientY - rect.top - 30}px`;
    });

    canvas.addEventListener('mouseleave', () => {
      tooltip.style.opacity = '0';
    });

    function timeToSec(t) {
      if (!t || t === '\\N') return null;
      const parts = t.split(':');
      return parts.length === 2
        ? parseInt(parts[0]) * 60 + parseFloat(parts[1])
        : parseFloat(t);
    }

    function drawChart(driverId) {
      const laps  = _lapData[driverId];
      const color = _lapColors[driverId] || '#e8002d';

      const W = canvas.offsetWidth || 900;
      canvas.width  = W;
      canvas.height = 220;
      const H = canvas.height;

      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, W, H);

      const valid = laps.filter(l => timeToSec(l.time) !== null);
      if (!valid.length) return;

      const times  = valid.map(l => timeToSec(l.time));
      const minT   = Math.min(...times);
      const maxT   = Math.max(...times);
      // Clamp outliers (pit out laps) to 110% of best
      const clampMax = minT * 1.10;
      const range  = clampMax - minT || 1;

      const PAD = { left: 48, right: 16, top: 10, bottom: 24 };
      const plotW = W - PAD.left - PAD.right;
      const plotH = H - PAD.top  - PAD.bottom;

      const xOf = i  => PAD.left + (i / (valid.length - 1)) * plotW;
      const yOf = t  => {
        const clamped = Math.min(clampMax, Math.max(minT, t));
        return PAD.top + plotH - ((clamped - minT) / range) * plotH;
      };

      // Gridlines
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth   = 1;
      [0.25, 0.5, 0.75].forEach(f => {
        const y = PAD.top + plotH * (1 - f);
        ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
      });

      // Y axis labels
      ctx.font      = '9px "Share Tech Mono"';
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.textAlign = 'right';
      [0, 0.5, 1].forEach(f => {
        const t = minT + range * f;
        const y = PAD.top + plotH * (1 - f);
        const m = Math.floor(t / 60);
        const s = (t % 60).toFixed(1).padStart(4, '0');
        ctx.fillText(`${m}:${s}`, PAD.left - 4, y + 3);
      });

      // X axis lap markers every 10
      ctx.textAlign = 'center';
      valid.forEach((l, i) => {
        if (l.lap % 10 === 0) {
          ctx.fillText(`L${l.lap}`, xOf(i), H - 6);
        }
      });

      // Shadow line
      ctx.beginPath();
      valid.forEach((l, i) => {
        const t = timeToSec(l.time);
        const x = xOf(i), y = yOf(t);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth   = 4;
      ctx.lineJoin    = 'round';
      ctx.stroke();

      // Main line
      ctx.beginPath();
      valid.forEach((l, i) => {
        const t = timeToSec(l.time);
        const x = xOf(i), y = yOf(t);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.strokeStyle = color + 'cc';
      ctx.lineWidth   = 2;
      ctx.stroke();

      // Dots — highlight fastest
      const fastestSec = minT;
      valid.forEach((l, i) => {
        const t    = timeToSec(l.time);
        const x    = xOf(i), y = yOf(t);
        const isBest = t === fastestSec;

        ctx.beginPath();
        ctx.arc(x, y, isBest ? 5 : 2.5, 0, Math.PI * 2);
        ctx.fillStyle = isBest ? '#39ff6f' : color;
        if (isBest) { ctx.shadowColor = '#39ff6f'; ctx.shadowBlur = 10; }
        ctx.fill();
        ctx.shadowBlur = 0;
      });

      // Best lap label
      const m = Math.floor(minT / 60);
      const s = (minT % 60).toFixed(3).padStart(6, '0');
      bestLbl.textContent = `BEST ${m}:${s}`;
    }
  }

  // ── Boot ─────────────────────────────────────────────
  async function boot() {
    if (!SEASON || !ROUND) return;

    const gpName = decodeURIComponent(GP_NAME);
    const sesLbl = decodeURIComponent(SESSION_LBL);
    document.getElementById('rh-session-name').textContent = `${gpName} — ${sesLbl}`;
    document.getElementById('rh-session-meta').textContent = `${SEASON} · Round ${ROUND}`;
    document.title = `F1 REPLAY — ${gpName} ${SEASON}`;

    // Resolve the ergast round number
    // If source=openf1, ROUND is a meeting_key — we need to find the ergast round
    let ergastRound = ROUND;
    if (SOURCE === 'openf1') {
      // Look up by GP name in Jolpica to find the correct round number
      const allRaces = await jFetch(`/${SEASON}/races`);
      const gpNameDecoded = decodeURIComponent(GP_NAME).toLowerCase();
      const matched = allRaces?.RaceTable?.Races?.find(r =>
        r.raceName?.toLowerCase().includes(gpNameDecoded.split('—')[0].trim()) ||
        gpNameDecoded.includes(r.Circuit?.Location?.locality?.toLowerCase())
      );
      if (matched) ergastRound = matched.round;
      else {
        document.getElementById('replay-loading').innerHTML =
          '<div class="rl-text" style="text-align:center">Could not match session to Jolpica data.<br><a href="index.html" style="color:var(--accent-red);margin-top:8px;display:inline-block">← Return to live</a></div>';
        return;
      }
    }

    // Fetch all data in two batches
    const [resultsData, pitsData] = await Promise.all([
      jFetch(`/${SEASON}/${ergastRound}/results`),
      jFetch(`/${SEASON}/${ergastRound}/pitstops`),
    ]);

    const [lapTimesData] = await Promise.all([
      jFetch(`/${SEASON}/${ergastRound}/laps`),
    ]);

    const results  = resultsData?.RaceTable?.Races?.[0]?.Results || [];
    const pits     = pitsData?.RaceTable?.Races?.[0]?.PitStops || [];
    const lapTimes = lapTimesData?.RaceTable?.Races?.[0]?.Laps?.flatMap(l =>
      l.Timings.map(t => ({ lap: l.number, driverId: t.driverId, time: t.time }))
    ) || [];

    if (!results.length) {
      document.getElementById('replay-loading').innerHTML =
        '<div class="rl-text" style="text-align:center">No data found for this session.<br><a href="index.html" style="color:var(--accent-red);margin-top:8px;display:inline-block">← Return to live</a></div>';
      return;
    }

    // Build synthetic stints from pit stop data (Jolpica has no tyre compound data)
    const syntheticStints = buildStintsFromPits(results, pits);

    // Render all sections
    const totalLaps = results[0] ? parseInt(results[0].laps) || 0 : 0;
    renderClassification(results, totalLaps);
    renderPitStops(pits);
    renderFastestLaps(results);
    renderStrategy(results, syntheticStints);
    renderLapChart(results, lapTimes);

    // Show main content
    document.getElementById('replay-loading').style.display  = 'none';
    document.getElementById('replay-main').style.display     = '';
  }

  // Build synthetic stints from pit stop data
  // Jolpica doesn't expose tyre compounds — we show lap ranges only
  function buildStintsFromPits(results, pits) {
    if (!pits?.length) return [];
    const stints = [];
    const byDriver = {};
    pits.forEach(p => {
      if (!byDriver[p.driverId]) byDriver[p.driverId] = [];
      byDriver[p.driverId].push(parseInt(p.lap));
    });

    Object.entries(byDriver).forEach(([driverId, stopLaps]) => {
      const result    = results.find(r => r.Driver?.driverId === driverId);
      const totalLaps = parseInt(result?.laps) || 60;
      const laps      = [1, ...stopLaps.sort((a,b)=>a-b), totalLaps + 1];

      for (let i = 0; i < laps.length - 1; i++) {
        stints.push({
          driverId,
          lap:      laps[i],
          compound: null, // no tyre data from Jolpica
        });
      }
    });

    return stints;
  }

  boot();
  </script>
